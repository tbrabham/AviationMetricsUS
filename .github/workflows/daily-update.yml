name: Daily Aviation Data Update
 
# Two runs per day:
#   9:00 AM CT  (14:00 UTC) — finalizes YESTERDAY with complete data
#  12:00 PM CT  (17:00 UTC) — captures TODAY as the live signal
#
# You can also trigger either run manually from the Actions tab.
 
on:
  schedule:
    - cron: '0 14 * * *'   # 9:00 AM CDT — finalize yesterday (DATE_OFFSET=1)
    - cron: '0 17 * * *'   # 12:00 PM CDT — capture today    (DATE_OFFSET=0)
  workflow_dispatch:
    inputs:
      date_offset:
        description: '0 = today, 1 = yesterday'
        required: false
        default: '0'
 
permissions:
  contents: write
 
jobs:
  update-aviation-data:
    runs-on: ubuntu-latest
 
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Run aviation update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 9 AM schedule = finalize yesterday (offset 1), noon = capture today (offset 0)
          # Manual runs use the input value, defaulting to 0
          DATE_OFFSET: >-
            ${{
              github.event_name == 'workflow_dispatch' && inputs.date_offset ||
              github.event.schedule == '0 14 * * *' && '1' ||
              '0'
            }}
        run: python update_aviation_github.py
