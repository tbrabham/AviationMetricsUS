name: Daily Aviation Data Update

# Runs every day at 9:00 AM Central Daylight Time (14:00 UTC)
# You can also trigger it manually from the Actions tab any time.
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:   # enables the "Run workflow" button in Actions tab

# Grant the built-in token permission to write to the repo
permissions:
  contents: write

jobs:
  update-aviation-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily aviation update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_aviation_github.py
